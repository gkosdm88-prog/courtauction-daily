<!doctype html><html lang=ko><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>경매 상가 리포트</title>
<link rel=stylesheet href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--navy:#0f1e3d;--blue:#2563eb;--red:#e0245e}
*{box-sizing:border-box;margin:0}body{font-family:'Pretendard',sans-serif;background:#f4f6fb;color:#1a2233;padding:20px;max-width:560px;margin:0 auto}
.hero{background:linear-gradient(135deg,#0f1e3d,#1c3a6e);color:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 10px 30px rgba(15,30,61,.25)}
.brand{font-size:11px;letter-spacing:3px;color:#9fb4e8;font-weight:700}
.hero h1{font-size:24px;margin:8px 0 4px;font-weight:800}.hero p{color:#c7d5f2;font-size:13.5px}
.cards{margin-top:16px;display:grid;gap:12px}
a.card{display:block;background:#fff;border:1px solid #e6eaf0;border-radius:16px;padding:20px;text-decoration:none;color:inherit;box-shadow:0 2px 12px rgba(20,40,80,.06);transition:.15s;position:relative}
a.card:active{transform:scale(.98)}
a.card .t{font-size:18px;font-weight:800;color:var(--navy)}
a.card .d{font-size:13px;color:#6b7688;margin-top:4px}
a.card .go{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:22px;font-weight:800}
.b-npl{border-left:5px solid var(--red)}.b-use{border-left:5px solid var(--blue)}
.foot{text-align:center;color:#8b95a7;font-size:11.5px;margin-top:18px}
</style></head><body>
<div class=hero><div class=brand>COURT AUCTION INTELLIGENCE</div>

<div class=cards>
<a class="card b-use" href="results_use.html"><div class=t>📊 이용상태 매칭</div><div class=d>스터디카페·학원·병원·의원 등 업종 매칭 물건</div><div class=go>›</div></a>
<a class="card b-npl" href="results_npl.html"><div class=t>🔴 NPL 부실채권</div><div class=d>유동화·대부·농협자산관리 채권승계 물건</div><div class=go>›</div></a>
</div>
<div class=foot>개인 투자조사용 · 매일 아침 자동 업데이트</div>
</body></html>
